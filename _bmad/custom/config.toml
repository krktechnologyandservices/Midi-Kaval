###############################################################################
# Implementation
###############################################################################

# Runs most frequently during development.
# Disable reasoning to reduce Premium Request consumption.
[agents.bmad-agent-dev]
api_options = { thinking = false }

[agents.bmad-checkpoint-preview]
api_options = { thinking = false }

# Reviews benefit from deeper reasoning.
[agents.bmad-code-review]
api_options = { thinking = true }

# Significant requirement changes require reasoning.
[agents.bmad-correct-course]
api_options = { thinking = true }

# Story generation follows templates.
[agents.bmad-create-story]
api_options = { thinking = false }

# Story execution happens very frequently.
[agents.bmad-dev-story]
api_options = { thinking = false }

# Root cause analysis benefits from reasoning.
[agents.bmad-investigate]
api_options = { thinking = true }

# Test generation is largely deterministic.
[agents.bmad-qa-generate-e2e-tests]
api_options = { thinking = false }

# Quick implementation should remain lightweight.
[agents.bmad-quick-dev]
api_options = { thinking = false }

[agents.bmad-retrospective]
api_options = { thinking = false }

[agents.bmad-sprint-planning]
api_options = { thinking = false }

[agents.bmad-sprint-status]
api_options = { thinking = false }