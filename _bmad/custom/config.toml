###############################################################################
# Team / Enterprise Overrides for _bmad/config.toml
#
# Purpose
# -------
# Optimize GitHub Copilot Premium usage by enabling reasoning only where
# it materially improves output quality.
#
# Guidelines
# ----------
# thinking = true
#   • Architecture
#   • Research
#   • Investigation
#   • Critical Reviews
#   • Brainstorming
#   • Product Design
#
# thinking = false
#   • Story Execution
#   • Coding from Existing Stories
#   • Documentation
#   • Sprint Planning
#   • Project Context Generation
#   • Formatting / Editorial Tasks
#
# NOTE:
# This file ONLY overrides settings.
# All other configuration is inherited from the base BMAD configuration.
###############################################################################

###############################################################################
# Core Skills
###############################################################################

[agents.bmad-advanced-elicitation]
api_options = { thinking = true }

[agents.bmad-brainstorming]
api_options = { thinking = true }

[agents.bmad-customize]
api_options = { thinking = true }

[agents.bmad-editorial-review-prose]
api_options = { thinking = false }

[agents.bmad-editorial-review-structure]
api_options = { thinking = false }

[agents.bmad-help]
api_options = { thinking = false }

[agents.bmad-index-docs]
api_options = { thinking = false }

[agents.bmad-party-mode]
api_options = { thinking = true }

[agents.bmad-review-adversarial-general]
api_options = { thinking = true }

[agents.bmad-review-edge-case-hunter]
api_options = { thinking = true }

[agents.bmad-shard-doc]
