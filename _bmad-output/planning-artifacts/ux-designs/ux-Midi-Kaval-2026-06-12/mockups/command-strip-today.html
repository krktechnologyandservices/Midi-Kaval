<!DOCTYPE html>
<!-- Spine: EXPERIENCE Component Patterns → Command Strip row; State → Cold open, Offline visit; Flow 1 -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kaval — Today Command Strip</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, sans-serif; background: #E4E7EC; display: flex; justify-content: center; padding: 24px; }
  .phone { width: 390px; background: #F8FAFC; border-radius: 32px; border: 8px solid #101828; overflow: hidden; min-height: 720px; }
  .status { height: 44px; background: #F8FAFC; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #475467; }
  .header { padding: 16px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { margin: 0; font-size: 22px; color: #101828; }
  .bell { width: 40px; height: 40px; border-radius: 8px; border: 1px solid #EAECF0; background: #fff; }
  .court-banner { margin: 0 16px 12px; padding: 10px 12px; background: #FFFAEB; border-left: 4px solid #B54708; border-radius: 8px; font-size: 13px; color: #101828; }
  .card { margin: 0 16px 12px; padding: 16px; background: #fff; border: 1px solid #EAECF0; border-radius: 12px; position: relative; }
  .card.overdue { border-left: 4px solid #B42318; }
  .sync { position: absolute; top: 12px; right: 12px; font-size: 11px; padding: 4px 8px; border-radius: 6px; background: #F4F3FF; color: #5925DC; }
  .crime { font-weight: 600; font-size: 15px; font-variant-numeric: tabular-nums; }
  .meta { font-size: 13px; color: #475467; margin-top: 4px; }
  .whisper { margin-top: 12px; padding: 10px; background: #EFF8FF; border-left: 3px solid #175CD3; font-size: 12px; color: #101828; }
  .actions { display: flex; gap: 8px; margin-top: 14px; }
  .btn { flex: 1; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; text-align: center; border: none; }
  .btn-secondary { background: #F8FAFC; border: 1px solid #EAECF0; color: #101828; }
  .btn-primary { background: #0D6E6E; color: #fff; }
  .tabs { position: absolute; bottom: 0; width: 390px; display: flex; border-top: 1px solid #EAECF0; background: #fff; }
  .tab { flex: 1; text-align: center; padding: 12px; font-size: 12px; color: #0D6E6E; font-weight: 600; }
  .tab.muted { color: #98A2B3; font-weight: 400; }
  .phone { position: relative; padding-bottom: 48px; }
</style>
</head>
<body>
<div class="phone">
  <div class="status">9:41</div>
  <div class="header">
    <h1>Today</h1>
    <div class="bell" aria-label="Notifications"></div>
  </div>
  <div class="court-banner">⚠ Court sitting Thursday — 2 days</div>
  <div class="card overdue">
    <span class="sync">Saved on this device</span>
    <div class="crime">Crime 4521/2024 · ST-8842</div>
    <div class="meta">Visit 1 · Slum domicile · GPS unverified</div>
    <div class="whisper">Handoff: Vocational referral pending. Next: first home visit.</div>
    <div class="actions">
      <button class="btn btn-secondary">Navigate</button>
      <button class="btn btn-primary">Start visit</button>
    </div>
  </div>
  <div class="card">
    <div class="crime">Crime 1198/2024 · ST-3310</div>
    <div class="meta">Visit 2 · 1.2 km · Synced</div>
    <div class="actions">
      <button class="btn btn-secondary">Navigate</button>
      <button class="btn btn-primary">Start visit</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab">Today</div>
    <div class="tab muted">Cases</div>
    <div class="tab muted">More</div>
  </div>
</div>
</body>
</html>
