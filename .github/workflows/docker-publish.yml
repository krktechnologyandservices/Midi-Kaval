name: Build and publish Docker images

# Only runs when something that actually affects the images changes, to avoid burning
# CI minutes on unrelated commits (docs, mobile-only changes, etc.). workflow_dispatch
# lets it be re-run manually from the Actions tab regardless of what changed.
on:
  push:
    branches: [master]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "packages/**"
      - "docker-compose.yml"
      - ".dockerignore"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Reuses docker-compose.yml's own build/image config directly, so there's only
      # one place (the compose file) that defines how these images are built — CI and
      # a developer's local `docker compose build` always stay in sync.
      - name: Build images
        run: docker compose build

      - name: Push images
        run: docker compose push

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # Update the VM_HOST secret yourself if the Oracle VM's IP ever changes
      # (it's currently an ephemeral IP, not a reserved/static one).
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: opc
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/Midi-Kaval
            docker compose pull
            docker compose up -d
