# Memory limits below are generous caps for a 12GB host — not a tight squeeze like a
# 1GB free-tier box would need. They still exist so one runaway container can't starve
# the others, but performance (Postgres cache, GC behavior) isn't artificially limited.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 512m
    command: >
      postgres
      -c shared_buffers=128MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c max_connections=100
    environment:
      POSTGRES_USER: kaval
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: kaval
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaval"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 256m
    # Only used here for OTP challenges / rate-limit counters — small, ephemeral data,
    # so a cap plus LRU eviction is still sensible even with RAM to spare.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "200mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    # image + build together: `docker compose build` (on a machine with enough RAM to
    # actually compile it) tags the result with this name; `docker compose pull && up`
    # on the VM then just runs that pre-built image without ever building locally.
    image: ghcr.io/krktechnologyandservices/midi-kaval-api:latest
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    mem_limit: 1536m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=kaval;Username=kaval;Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Hangfire: "Host=postgres;Port=5432;Database=kaval;Username=kaval;Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__Issuer: MidiKaval
      Jwt__Audience: MidiKaval
      ACTIVATION_LINK_SIGNING_KEY: ${ACTIVATION_LINK_SIGNING_KEY}
      EncryptionKey__MasterKey: ${ENCRYPTION_MASTER_KEY}
      Seed__OrganisationId: ${SEED_ORGANISATION_ID}
      Seed__Admin__Email: ${SEED_ADMIN_EMAIL}
      Seed__Admin__Password: ${SEED_ADMIN_PASSWORD}
      Seed__Vendor__Email: ${SEED_VENDOR_EMAIL}
      Seed__Vendor__Password: ${SEED_VENDOR_PASSWORD}
      B2Storage__Region: ${B2_REGION}
      B2Storage__AccessKeyId: ${B2_ACCESS_KEY_ID}
      B2Storage__SecretAccessKey: ${B2_SECRET_ACCESS_KEY}
      B2Storage__BucketName: ${B2_BUCKET_NAME}
      Email__Provider: Brevo
      Email__Brevo__ApiKey: ${BREVO_API_KEY}
      Email__Brevo__SenderEmail: ${BREVO_SENDER_EMAIL}
      Email__Brevo__SenderName: Midi Kaval
      Cors__AllowedOrigins__0: "https://${SITE_DOMAIN}"
      ConfirmationLink__BaseUrl: "https://${SITE_DOMAIN}"
      ActivationLink__BaseUrl: "https://${SITE_DOMAIN}"

  web:
    image: ghcr.io/krktechnologyandservices/midi-kaval-web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    mem_limit: 128m
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN}
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
