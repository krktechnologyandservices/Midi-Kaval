apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

react {
    root = file("../../")
    reactNativeDir = file("../../../../node_modules/react-native")
    codegenDir = file("../../../../node_modules/@react-native/codegen")
    cliFile = file("../../../../node_modules/react-native/cli.js")
    autolinkLibrariesWithApp()
}

// Copies react-native-vector-icons' .ttf font files into this app's assets so icon
// glyphs actually render on-device instead of showing as empty boxes/missing-glyph tofu.
// fonts.gradle's default iconFontsDir ("../../node_modules/...") assumes a single-package
// RN project two levels above android/app — in this monorepo, node_modules is hoisted to
// the workspace root, four levels up, so the default resolves to a path that doesn't
// exist and the copy task silently copies zero files. Point it at the real location.
project.ext.vectoricons = [
    iconFontsDir: "../../../../node_modules/react-native-vector-icons/Fonts",
    iconFontNames: ["MaterialCommunityIcons.ttf"]
]
apply from: file("../../../../node_modules/react-native-vector-icons/fonts.gradle")

def enableProguardInReleaseBuilds = false
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.midikaval.mobile"
    defaultConfig {
        applicationId "com.midikaval.mobile"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

// Must be applied after the android/react plugins above and the dependencies block — it
// reads google-services.json (present in this directory) to configure the Firebase app
// that @react-native-firebase/messaging needs at runtime.
apply plugin: "com.google.gms.google-services"
